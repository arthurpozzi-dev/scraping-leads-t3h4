# Balanceador na frente das réplicas do serviço "lighthouse".
# O resolver é o DNS embutido do Docker (127.0.0.11). Usar uma VARIÁVEL em
# proxy_pass força a resolução por requisição, então o nginx enxerga novas
# réplicas (docker compose --scale) sem precisar reiniciar.

events {}

http {
  resolver 127.0.0.11 valid=10s ipv6=off;

  server {
    listen 3001;

    # Lighthouse é lento: cada análise pode levar dezenas de segundos.
    proxy_connect_timeout 5s;
    proxy_read_timeout 180s;
    proxy_send_timeout 180s;

    location / {
      set $upstream "http://lighthouse:3001";
      # $request_uri é obrigatório: com variável no proxy_pass, o nginx NÃO
      # reanexa o path+query automaticamente — sem isto a query (?url=...) some.
      proxy_pass $upstream$request_uri;
    }
  }
}
